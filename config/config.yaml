# LightMonitor - Video Stream AI Detection Platform Configuration


detection:
  model_url: "http://localhost:8501/v1/models/yolo:predict"
  auth:
    type: "api_key"           # Options: api_key, bearer, none
    token: ""
  confidence_threshold: 0.5

alarm:
  enabled: true
  webhook_url: "http://external-alarm-system/api/v1/alerts"
  auth:
    type: "bearer"
    token: ""

queue: 
  maxsize: 100              # Max frames in the internal async queue

rustfs:
  endpoint: "localhost:9000"
  access_key: "rustfsadmin"
  secret_key: "rustfsadmin"
  bucket: "lightmonitor"
  secure: false

logging:
  jsonl_path: "logs/detections.jsonl"  # JSONL log file path
  rotate_when: "midnight"              # Daily log rotation
  backup_count: 7                      # Keep last 7 rotated logs

server:
  host: "0.0.0.0"
  port: 8000