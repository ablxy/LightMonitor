# LightMonitor - Video Stream AI Detection Platform Configuration


detection:
  model_url: "http://maas.gd.chinamobile.com:36007/ai/aiFactoryServer/v1/apis/1/v1/chat/completions"
  auth:
    type: "Bearer"           # Options: accessKeyId, Bearer, none
    token: "your_api_token_here"
  confidence_threshold: 0.5
  model_type: "vlm"        # Options: vlm, yolo
  model_name: "Qwen3-VL-8B"       
  vlm:
    system_prompt: ""
    prompt: "Detect all trucks. Output only a JSON code block: ```json {\"detections\": [{\"label\": \"truck\", \"confidence\": 0.0-1.0 or null, \"bbox\": [x_min, y_min, x_max, y_max] }]}``` No other text."


queue: 
  maxsize: 100              # Max frames in the internal async queue

storage:
  db_path: "data/lightmonitor.db"
  snapshots_dir: "data/snapshots"

logging:
  jsonl_path: "logs/detections.jsonl"  # JSONL log file path
  rotate_when: "midnight"              # Daily log rotation
  backup_count: 7                      # Keep last 7 rotated logs

server:
  host: "0.0.0.0"
  port: 8000